version: '3.8'

services:
  # 1. Local Headless Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=http://db:5432
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=mock-anon-key
      - SUPABASE_SERVICE_ROLE_KEY=mock-service-role-key
      - NEXT_PUBLIC_MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_MASTER_KEY=meili-secret-key-123
      - UPSTASH_REDIS_REST_URL=http://redis:8079
      - UPSTASH_REDIS_REST_TOKEN=mock-redis-token
    depends_on:
      - db
      - meilisearch

  # 2. Local PostgreSQL Database
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres-secret-password-123
      POSTGRES_DB: store_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 3. High-Speed Search Engine
  meilisearch:
    image: getmeili/meilisearch:v1.6
    restart: always
    ports:
      - "7700:7700"
    environment:
      - MEILI_ENV=development
      - MEILI_MASTER_KEY=meili-secret-key-123
    volumes:
      - meilidata:/meili_data

volumes:
  pgdata:
  meilidata:
